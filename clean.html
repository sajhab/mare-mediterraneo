<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cleaner - Mare Mediterraneo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C8963E;--pietra:#C8B99A;--notte:#0A0A12;--notte2:#0F0F1A;--sabbia:#F5EFE6;--text:#E8DDD0;--muted:rgba(232,221,208,0.5);--border:rgba(200,185,154,0.15);--green:#27ae60;--red:#e74c3c;--blue:#6677ff}
body{background:var(--notte);color:var(--text);font-family:'Tenor Sans',sans-serif;min-height:100vh}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:100%;max-width:340px;background:var(--notte2);border:1px solid var(--border);border-radius:8px;padding:32px 24px;text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;color:var(--pietra);margin-bottom:4px}
.login-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.lang-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.lang-pill{padding:5px 14px;border-radius:20px;border:1px solid var(--border);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;font-family:'Tenor Sans',sans-serif}
.lang-pill.active{background:var(--gold);color:var(--notte);border-color:var(--gold)}
.login-input{width:100%;background:rgba(200,185,154,0.06);border:1px solid var(--border);border-radius:3px;padding:14px;font-family:'Tenor Sans',sans-serif;font-size:18px;color:var(--text);margin-bottom:12px;outline:none;text-align:center;letter-spacing:4px}
.login-btn{width:100%;padding:14px;background:var(--gold);color:var(--notte);border:none;border-radius:3px;font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-weight:600}
.login-error{color:var(--red);font-size:11px;margin-top:8px;display:none}

/* APP */
#app{display:none}
.header{background:var(--notte2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.greeting{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--sabbia)}
.header-date{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.header-right{display:flex;gap:8px;align-items:center}
.lang-sm{padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;font-family:'Tenor Sans',sans-serif}
.lang-sm.active{background:var(--gold);color:var(--notte);border-color:var(--gold)}
.exit-btn{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border);padding:6px 12px;border-radius:2px;cursor:pointer;font-family:'Tenor Sans',sans-serif}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--notte2)}
.tab{flex:1;padding:13px;text-align:center;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Tenor Sans',sans-serif}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

.content{padding:16px;max-width:640px;margin:0 auto}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;font-family:'Tenor Sans',sans-serif}
.filter-pill.active{background:rgba(200,150,62,0.15);border-color:var(--gold);color:var(--gold)}
.date-input{background:rgba(200,185,154,0.05);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:1px;color:var(--muted);outline:none;cursor:pointer}
.date-input:focus{border-color:var(--gold);color:var(--text)}

/* SECTION */
.sec-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin:20px 0 12px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* TODAY CARDS */
.clean-card{background:var(--notte2);border-radius:6px;overflow:hidden;margin-bottom:10px}
.clean-card-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.clean-card-head.needs{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.2)}
.clean-card-head.in_progress{background:rgba(102,119,255,0.1);border:1px solid rgba(102,119,255,0.25)}
.clean-card-head.done{background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.2)}
.clean-card-head.free{background:rgba(200,185,154,0.04);border:1px solid var(--border)}
.suite-name{font-size:10px;letter-spacing:3px;text-transform:uppercase}
.suite-name.needs{color:var(--red)}
.suite-name.in_progress{color:var(--blue)}
.suite-name.done{color:var(--green)}
.suite-name.free{color:var(--muted)}
.clean-card-body{border:1px solid var(--border);border-top:none;padding:14px 16px}
.clean-info{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--sabbia);margin-bottom:3px}
.clean-sub{font-size:10px;color:var(--muted);margin-bottom:12px}
.btn-row{display:flex;gap:8px}
.btn-start{padding:10px 18px;background:rgba(102,119,255,0.12);border:1px solid rgba(102,119,255,0.3);border-radius:3px;color:var(--blue);font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.btn-done{padding:10px 18px;background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.3);border-radius:3px;color:var(--green);font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.btn-undo{padding:10px 18px;background:rgba(200,185,154,0.05);border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.stamp{font-size:9px;color:var(--muted);margin-top:10px}
.cleaner-picker{margin-top:12px;padding:12px 14px;background:rgba(200,185,154,0.04);border:1px solid var(--border);border-radius:4px;display:none}
.cleaner-picker.show{display:block}
.cleaner-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.cleaner-btns{display:flex;gap:8px;flex-wrap:wrap}
.cleaner-num{width:44px;height:44px;border-radius:4px;border:1px solid var(--border);background:rgba(200,185,154,0.04);color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.cleaner-num.selected{background:rgba(200,150,62,0.15);border-color:var(--gold);color:var(--gold)}
.cleaner-confirm{margin-top:10px;width:100%;padding:10px;background:rgba(102,119,255,0.12);border:1px solid rgba(102,119,255,0.3);border-radius:3px;color:var(--blue);font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.num-cleaners-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:6px}
.num-cleaners-badge span{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold)}

/* UPCOMING CARDS */
.upcoming-card{background:var(--notte2);border:1px solid var(--border);border-radius:4px;padding:14px 16px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start}
.date-block{text-align:center;min-width:44px}
.date-num{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--gold);line-height:1}
.date-month{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.date-day{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:1px}
.ev-body{flex:1}
.ev-suite{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.ev-action{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--sabbia);margin-bottom:2px}
.ev-sub{font-size:10px;color:var(--muted)}
.ev-tag{display:inline-block;font-size:7px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;margin-top:5px}
.tag-out{background:rgba(231,76,60,0.15);color:var(--red)}
.tag-in{background:rgba(39,174,96,0.15);color:var(--green)}
.tag-today{background:rgba(200,150,62,0.2);color:var(--gold)}
.tag-tomorrow{background:rgba(200,150,62,0.1);color:var(--gold)}

/* HISTORY */
.hist-card{background:var(--notte2);border:1px solid var(--border);border-radius:4px;padding:14px 16px;margin-bottom:8px}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hist-suite{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.hist-date{font-size:10px;color:var(--muted)}
.hist-cleaner{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--sabbia);margin-bottom:4px}
.hist-meta{font-size:10px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.hist-badge{display:inline-block;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;margin-top:5px}
.badge-done{background:rgba(39,174,96,0.15);color:var(--green)}
.badge-progress{background:rgba(102,119,255,0.15);color:var(--blue)}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px}
.loading{text-align:center;padding:24px;color:var(--muted);font-size:10px;letter-spacing:3px;text-transform:uppercase}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--gold);color:var(--sabbia);padding:10px 22px;border-radius:4px;font-size:11px;letter-spacing:1px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Mare Mediterraneo</div>
    <div class="login-sub" id="lSub">Portale Pulizie</div>
    <div class="lang-row">
      <button class="lang-pill active" id="lLangIt">IT</button>
      <button class="lang-pill" id="lLangEn">EN</button>
    </div>
    <input type="password" class="login-input" id="loginPass" placeholder="••••••••">
    <button class="login-btn" id="loginBtn">Entra</button>
    <div class="login-error" id="loginError">Password errata</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <div class="greeting" id="greeting"></div>
      <div class="header-date" id="hDate"></div>
    </div>
    <div class="header-right">
      <button class="lang-sm active" id="aLangIt">IT</button>
      <button class="lang-sm" id="aLangEn">EN</button>
      <button class="exit-btn" id="exitBtn">Esci</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabToday"    onclick="switchTab('today')"><span id="lblToday">Oggi</span></div>
    <div class="tab"        id="tabUpcoming" onclick="switchTab('upcoming')"><span id="lblUpcoming">Prossime</span></div>
    <div class="tab"        id="tabHistory"  onclick="switchTab('history')"><span id="lblHistory">Storico</span></div>
  </div>

  <div class="content">

    <!-- TODAY -->
    <div id="panelToday">
      <div id="todayContent"><div class="loading">Caricamento...</div></div>
    </div>

    <!-- UPCOMING -->
    <div id="panelUpcoming" style="display:none">
      <div class="filter-bar" id="upcomingFilters">
        <button class="filter-pill active" data-uf="all"    onclick="setUF('all')"><span id="ufAll">Tutte</span></button>
        <button class="filter-pill"        data-uf="pietra" onclick="setUF('pietra')">Pietra</button>
        <button class="filter-pill"        data-uf="cielo"  onclick="setUF('cielo')">Cielo</button>
        <button class="filter-pill"        data-uf="villa"  onclick="setUF('villa')">Villa</button>
        <input type="date" class="date-input" id="upcomingFrom" title="From">
        <input type="date" class="date-input" id="upcomingTo"   title="To">
      </div>
      <div id="upcomingContent"><div class="loading">Caricamento...</div></div>
    </div>

    <!-- HISTORY -->
    <div id="panelHistory" style="display:none">
      <div class="filter-bar">
        <button class="filter-pill active" data-hf="all"    onclick="setHF('all')"><span id="hfAll">Tutto</span></button>
        <button class="filter-pill"        data-hf="pietra" onclick="setHF('pietra')">Pietra</button>
        <button class="filter-pill"        data-hf="cielo"  onclick="setHF('cielo')">Cielo</button>
        <button class="filter-pill"        data-hf="villa"  onclick="setHF('villa')">Villa</button>
      </div>
      <div id="historyContent"><div class="loading">Caricamento...</div></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var CLEANER = 'Daniela';
var SB_URL  = 'https://wbosfegdgizkygxjxjiz.supabase.co';
var SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indib3NmZWdkZ2l6a3lneGp4aml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTQ5NjksImV4cCI6MjA5NDA3MDk2OX0.aQxHyA8NJmY0LAbRNo6EibF5zN5shQey-JNyI0t-GCg';
var lang    = 'it';
var bookings = [];
var sessions = {}; // { suite: [session,...] }
var currentTab = 'today';
var upcomingFilter = 'all';
var historyFilter  = 'all';

var SUITE_NAMES = { pietra:'Suite Pietra', cielo:'Suite Cielo', villa:'Villa Completa' };

var TXT = {
  it:{
    sub:'Portale Pulizie', btn:'Entra', err:'Password errata', exit:'Esci',
    gm:'Buongiorno', ga:'Buon pomeriggio', ge:'Buonasera',
    today:'Oggi', upcoming:'Prossime', history:'Storico',
    all:'Tutte', allH:'Tutto',
    needsClean:'Da Pulire', inProgress:'In Corso', done:'Completata', free:'Libera',
    checkout:'Check-out oggi', checkin:'Check-in domani',
    nextGuest:'Prossimo ospite', noNext:'Nessun prossimo ospite',
    start:'Inizia', markDone:'Fatto', undo:'Annulla', howMany:'Quante persone puliscono?', confirmStart:'Conferma e Inizia',
    started:'Iniziato', completed:'Completato',
    noToday:'Nessuna pulizia prevista oggi',
    noUpcoming:'Nessun evento nel periodo selezionato',
    noHistory:'Nessuna pulizia registrata',
    tout:'Check-out', tin:'Check-in',
    confirmDone:'Confermi che la pulizia è completata?',
    duration:'Durata'
  },
  en:{
    sub:'Cleaner Portal', btn:'Enter', err:'Wrong password', exit:'Exit',
    gm:'Good morning', ga:'Good afternoon', ge:'Good evening',
    today:'Today', upcoming:'Upcoming', history:'History',
    all:'All', allH:'All',
    needsClean:'Clean Now', inProgress:'In Progress', done:'Done', free:'Free',
    checkout:'Check-out today', checkin:'Check-in tomorrow',
    nextGuest:'Next guest', noNext:'No next guest',
    start:'Start', markDone:'Mark Done', undo:'Undo', howMany:'How many cleaners?', confirmStart:'Confirm & Start',
    started:'Started', completed:'Completed',
    noToday:'No cleanings scheduled today',
    noUpcoming:'No events in selected period',
    noHistory:'No cleaning sessions recorded',
    tout:'Check-out', tin:'Check-in',
    confirmDone:'Confirm cleaning is complete?',
    duration:'Duration'
  }
};
function tx(k){ return (TXT[lang]&&TXT[lang][k]) ? TXT[lang][k] : (TXT.en[k]||k); }
function dStr(d){ return d.toISOString().split('T')[0]; }
function addDays(s,n){ var d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return dStr(d); }
function fmtDate(s){ return new Date(s+'T00:00:00').toLocaleDateString(lang==='it'?'it-IT':'en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function fmtTime(ts){ if(!ts) return '—'; return new Date(ts).toLocaleTimeString(lang==='it'?'it-IT':'en-GB',{hour:'2-digit',minute:'2-digit'}); }
function sbH(){ return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}; }
function showToast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2500); }

// ── SUPABASE ──────────────────────────────────────────────────
function sbGet(table, q){
  return fetch(SB_URL+'/rest/v1/'+table+'?'+q, {headers:sbH()})
    .then(function(r){ return r.json(); })
    .then(function(d){ return Array.isArray(d)?d:[]; })
    .catch(function(){ return []; });
}
function sbPost(table, data){
  return fetch(SB_URL+'/rest/v1/'+table, {method:'POST',headers:sbH(),body:JSON.stringify(data)})
    .then(function(r){ return r.json(); });
}
function sbPatch(table, q, data){
  return fetch(SB_URL+'/rest/v1/'+table+'?'+q, {method:'PATCH',headers:sbH(),body:JSON.stringify(data)})
    .then(function(r){ return r.json(); });
}

// ── LOAD ──────────────────────────────────────────────────────
function loadData(cb){
  var today = dStr(new Date());
  var far   = addDays(today, 365);
  Promise.all([
    sbGet('bookings',  'order=checkin.asc&checkout=gte.'+addDays(today,-1)+'&checkin=lte.'+far+'&status=eq.confirmed'),
    sbGet('cleaning_sessions', 'order=date.desc')
  ]).then(function(res){
    bookings = res[0];
    sessions = {};
    res[1].forEach(function(s){
      if(!sessions[s.suite]) sessions[s.suite]=[];
      sessions[s.suite].push(s);
    });
    if(cb) cb();
  });
}

function getSession(suite, date){
  return (sessions[suite]||[]).find(function(s){ return s.date===date; }) || null;
}

// ── TODAY LOGIC ───────────────────────────────────────────────
// A suite needs cleaning on date D if:
//   - there is a checkout on D  (clean same day after 10:00)
//   - there is a checkin on D+1 (clean day before so it's ready)
// Both cases: clean window = D
function getTodayCleans(){
  var today = dStr(new Date());
  var d1    = addDays(today, 1);
  var d2    = addDays(today, 2);
  var result = {};

  bookings.forEach(function(b){
    if(b.linked_to_villa) return;
    var suite = b.suite;
    if(result[suite]) return; // already registered for this suite

    // checkout today → clean today
    if(b.checkout === today){
      result[suite] = {
        type: 'checkout',
        nextCheckin: null
      };
      // find next guest
      var next = bookings.filter(function(x){ return x.suite===suite && x.checkin>=today && x.id!==b.id; })
        .sort(function(a,c){ return a.checkin>c.checkin?1:-1; })[0];
      if(next) result[suite].nextCheckin = next.checkin;
      return;
    }

    // checkin today, tomorrow or day after → clean now
    if(b.checkin === today || b.checkin === d1 || b.checkin === d2){
      var daysUntil = Math.round((new Date(b.checkin+'T00:00:00') - new Date(today+'T00:00:00')) / 86400000);
      result[suite] = {
        type: 'checkin',
        daysUntil: daysUntil,
        nextCheckin: b.checkin
      };
      return;
    }
  });

  return result;
}

// ── RENDER TODAY ──────────────────────────────────────────────
function renderToday(){
  var today  = dStr(new Date());
  var cleans = getTodayCleans();
  var suites = Object.keys(cleans);

  if(!suites.length){
    document.getElementById('todayContent').innerHTML =
      '<div class="empty">'+tx('noToday')+'</div>';
    return;
  }

  var h = '<div class="sec-title">'+(lang==='it'?'Pulizie di Oggi':'Today\'s Cleanings')+'</div>';

  suites.forEach(function(suite){
    var info = cleans[suite];
    var sess = getSession(suite, today);
    var status = sess ? sess.status : 'needs'; // needs | in_progress | done
    var sName  = SUITE_NAMES[suite] || suite;

    // Head
    h += '<div class="clean-card">';
    h += '<div class="clean-card-head '+status+'">';
    h += '<span class="suite-name '+status+'">'+sName+'</span>';
    h += '<span style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">'+tx(status==='needs'?'needsClean':status==='in_progress'?'inProgress':'done')+'</span>';
    h += '</div>';

    // Body
    h += '<div class="clean-card-body">';

    var reasonTxt;
    if(info.type==='checkout'){
      reasonTxt = lang==='it' ? 'Check-out stamattina · Pulire prima delle 15:00' : 'Check-out this morning · Clean before 15:00';
    } else {
      if(info.daysUntil===0)      reasonTxt = lang==='it' ? 'Ospite in arrivo OGGI alle 15:00' : 'Guest arriving TODAY at 15:00';
      else if(info.daysUntil===1) reasonTxt = lang==='it' ? 'Ospite in arrivo domani alle 15:00' : 'Guest arriving tomorrow at 15:00';
      else                        reasonTxt = lang==='it' ? 'Ospite in arrivo dopodomani alle 15:00' : 'Guest arriving in 2 days at 15:00';
    }
    h += '<div class="clean-info">'+reasonTxt+'</div>';
    if(info.nextCheckin){
      h += '<div class="clean-sub" style="font-size:10px;color:var(--gold);margin-top:2px">'+tx('nextGuest')+': '+fmtDate(info.nextCheckin)+' 15:00</div>';
    }

    // Timestamps
    if(sess && sess.num_cleaners){
      h += '<div class="num-cleaners-badge">'+(lang==='it'?'Pulitrici:':'Cleaners:')+' <span>'+sess.num_cleaners+'</span></div>';
    }
    if(sess && sess.started_at){
      var stamp = tx('started')+': '+fmtTime(sess.started_at);
      if(sess.completed_at) stamp += '  ·  '+tx('completed')+': '+fmtTime(sess.completed_at);
      if(sess.completed_at && sess.started_at){
        var mins = Math.round((new Date(sess.completed_at)-new Date(sess.started_at))/60000);
        stamp += '  ·  '+tx('duration')+': '+mins+'m';
      }
      h += '<div class="clean-sub">'+stamp+'</div>';
    } else {
      h += '<div class="clean-sub">'+(lang==='it'?'Pronta dopo le 10:00':'Ready after 10:00')+'</div>';
    }

    // Buttons
    h += '<div class="btn-row">';
    if(!sess || sess.status==='needs'){
      h += '<button class="btn-start" onclick="openCleanerPicker(\''+suite+'\')">▶ '+tx('start')+'</button>';
    }
    if(sess && sess.status==='in_progress'){
      h += '<button class="btn-done" onclick="markDone(\''+suite+'\')">✓ '+tx('markDone')+'</button>';
    }
    if(sess && sess.status==='done'){
      h += '<button class="btn-undo" onclick="undoDone(\''+suite+'\')">↩ '+tx('undo')+'</button>';
    }
    h += '</div>';
    // Cleaner count picker (hidden until Start clicked)
    h += '<div class="cleaner-picker" id="picker-'+suite+'">';
    h += '<div class="cleaner-label">'+tx('howMany')+'</div>';
    h += '<div class="cleaner-btns">';
    for(var n=1;n<=6;n++){
      h += '<div class="cleaner-num" data-suite="'+suite+'" data-n="'+n+'" onclick="selectCleanerNum(\''+suite+'\','+n+')">'+n+'</div>';
    }
    h += '</div>';
    h += '<button class="cleaner-confirm" id="confirmStart-'+suite+'" onclick="confirmStartCleaning(\''+suite+'\')">'+tx('confirmStart')+'</button>';
    h += '</div>';
    h += '</div></div>'; // body + card
  });

  document.getElementById('todayContent').innerHTML = h;
}

// ── SESSION ACTIONS ───────────────────────────────────────────
var _pickerSelection = {}; // { suite: numCleaners }

function openCleanerPicker(suite){
  var picker = document.getElementById('picker-'+suite);
  if(!picker) return;
  picker.classList.toggle('show');
  // default select 1
  if(!_pickerSelection[suite]){
    _pickerSelection[suite] = 1;
    var first = picker.querySelector('[data-n="1"]');
    if(first) first.classList.add('selected');
  }
}

function selectCleanerNum(suite, n){
  _pickerSelection[suite] = n;
  var picker = document.getElementById('picker-'+suite);
  if(!picker) return;
  picker.querySelectorAll('.cleaner-num').forEach(function(el){
    el.classList.toggle('selected', parseInt(el.getAttribute('data-n'))===n);
  });
}

async function confirmStartCleaning(suite){
  var today = dStr(new Date());
  if(getSession(suite, today)){ renderToday(); return; }
  var n = _pickerSelection[suite] || 1;
  var row = {suite:suite, date:today, status:'in_progress', started_at:new Date().toISOString(), cleaner:CLEANER, num_cleaners:n, checklist:{}, notes:''};
  var result = await sbPost('cleaning_sessions', row);
  var s = Array.isArray(result) ? result[0] : result;
  if(!sessions[suite]) sessions[suite]=[];
  sessions[suite].unshift(s);
  showToast(lang==='it'?'Pulizia iniziata con '+n+(n===1?' persona':' persone')+'!':'Started with '+n+(n===1?' cleaner':' cleaners')+'!');
  renderToday();
}

async function markDone(suite){
  if(!confirm(tx('confirmDone'))) return;
  var today = dStr(new Date());
  var sess  = getSession(suite, today);
  if(!sess) return;
  var now = new Date().toISOString();
  await sbPatch('cleaning_sessions', 'id=eq.'+sess.id, {status:'done', completed_at:now});
  sess.status='done'; sess.completed_at=now;
  showToast(lang==='it'?'Pulizia completata ✓':'Done ✓');
  renderToday();
}

async function undoDone(suite){
  var today = dStr(new Date());
  var sess  = getSession(suite, today);
  if(!sess) return;
  await sbPatch('cleaning_sessions', 'id=eq.'+sess.id, {status:'in_progress', completed_at:null});
  sess.status='in_progress'; sess.completed_at=null;
  renderToday();
}

// ── RENDER UPCOMING ───────────────────────────────────────────
function renderUpcoming(){
  var today   = dStr(new Date());
  var fromVal = document.getElementById('upcomingFrom').value || today;
  var toVal   = document.getElementById('upcomingTo').value   || addDays(today, 30);

  var events = [];
  bookings.forEach(function(b){
    if(b.linked_to_villa) return;
    var sn = SUITE_NAMES[b.suite] || b.suite;
    if(b.checkout >= fromVal && b.checkout <= toVal)
      events.push({date:b.checkout, type:'out', suite:b.suite, suiteName:sn, guest:b.guest||''});
    if(b.checkin  >= fromVal && b.checkin  <= toVal)
      events.push({date:b.checkin,  type:'in',  suite:b.suite, suiteName:sn, guest:b.guest||''});
  });

  events.sort(function(a,b){ return a.date>b.date?1:a.date<b.date?-1:0; });

  if(upcomingFilter !== 'all')
    events = events.filter(function(e){ return e.suite===upcomingFilter; });

  if(!events.length){
    document.getElementById('upcomingContent').innerHTML='<div class="empty">'+tx('noUpcoming')+'</div>';
    return;
  }

  var tomorrow = addDays(today, 1);
  var h = '';
  events.forEach(function(e){
    var d        = new Date(e.date+'T00:00:00');
    var isToday  = e.date===today;
    var isTomorrow = e.date===tomorrow;
    var dayLabel = isToday ? tx('today') : isTomorrow ? (lang==='it'?'DOMANI':'TOMORROW') :
      d.toLocaleDateString(lang==='it'?'it-IT':'en-GB',{weekday:'short'}).toUpperCase();
    var monthLbl = d.toLocaleDateString(lang==='it'?'it-IT':'en-GB',{month:'short'}).toUpperCase();
    var tagCls   = isToday ? 'tag-today' : isTomorrow ? 'tag-tomorrow' : (e.type==='out'?'tag-out':'tag-in');
    var tagLbl   = e.type==='out' ? tx('tout') : tx('tin');
    var action, sub;
    if(e.type==='out'){
      action = e.guest ? e.guest+(lang==='it'?' lascia':' checks out') : tx('tout');
      sub    = '10:00';
    } else {
      action = e.guest ? e.guest+(lang==='it'?' arriva':' arrives') : tx('tin');
      sub    = '15:00';
    }
    h += '<div class="upcoming-card">';
    h += '<div class="date-block"><div class="date-num">'+d.getDate()+'</div><div class="date-month">'+monthLbl+'</div><div class="date-day">'+dayLabel+'</div></div>';
    h += '<div class="ev-body"><div class="ev-suite">'+e.suiteName+'</div>';
    h += '<div class="ev-action">'+action+'</div>';
    h += '<div class="ev-sub">'+sub+'</div>';
    h += '<span class="ev-tag '+tagCls+'">'+tagLbl+(isToday?' · '+tx('today').toUpperCase():'')+'</span>';
    h += '</div></div>';
  });
  document.getElementById('upcomingContent').innerHTML = h;
}

// ── RENDER HISTORY ────────────────────────────────────────────
function renderHistory(){
  var all = [];
  Object.values(sessions).forEach(function(list){ all=all.concat(list); });
  all.sort(function(a,b){ return a.date<b.date?1:-1; });
  if(historyFilter!=='all') all=all.filter(function(s){ return s.suite===historyFilter; });

  if(!all.length){
    document.getElementById('historyContent').innerHTML='<div class="empty">'+tx('noHistory')+'</div>';
    return;
  }

  var h='';
  all.forEach(function(s){
    var isDone = s.status==='done';
    var dur='';
    if(s.started_at && s.completed_at){
      var mins=Math.round((new Date(s.completed_at)-new Date(s.started_at))/60000);
      dur=mins+'m';
    }
    h+='<div class="hist-card">';
    h+='<div class="hist-top"><div><div class="hist-suite">'+(SUITE_NAMES[s.suite]||s.suite)+'</div>';
    h+='<div class="hist-cleaner">'+(s.cleaner||'—')+'</div></div>';
    h+='<div class="hist-date">'+fmtDate(s.date)+'</div></div>';
    h+='<div class="hist-meta">';
    if(s.started_at)   h+='<span>'+tx('started')+': '+fmtTime(s.started_at)+'</span>';
    if(s.completed_at) h+='<span>'+tx('completed')+': '+fmtTime(s.completed_at)+'</span>';
    if(dur)            h+='<span>'+tx('duration')+': '+dur+'</span>';
    if(s.num_cleaners) h+='<span>'+(lang==='it'?'Pulitrici':'Cleaners')+': '+s.num_cleaners+'</span>';
    h+='</div>';
    h+='<span class="hist-badge '+(isDone?'badge-done':'badge-progress')+'">'+tx(isDone?'done':'inProgress')+'</span>';
    h+='</div>';
  });
  document.getElementById('historyContent').innerHTML=h;
}

// ── FILTERS ───────────────────────────────────────────────────
function setUF(f){
  upcomingFilter=f;
  document.querySelectorAll('[data-uf]').forEach(function(el){
    el.classList.toggle('active', el.getAttribute('data-uf')===f);
  });
  renderUpcoming();
}
function setHF(f){
  historyFilter=f;
  document.querySelectorAll('[data-hf]').forEach(function(el){
    el.classList.toggle('active', el.getAttribute('data-hf')===f);
  });
  renderHistory();
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  ['today','upcoming','history'].forEach(function(t){
    var cap=t.charAt(0).toUpperCase()+t.slice(1);
    document.getElementById('panel'+cap).style.display=t===tab?'block':'none';
    document.getElementById('tab'+cap).classList.toggle('active',t===tab);
  });
  if(tab==='upcoming') renderUpcoming();
  if(tab==='history')  renderHistory();
}

// ── LANGUAGE ─────────────────────────────────────────────────
function setLang(l, isLogin){
  lang=l;
  if(isLogin){
    document.getElementById('lLangIt').classList.toggle('active',l==='it');
    document.getElementById('lLangEn').classList.toggle('active',l==='en');
    document.getElementById('lSub').textContent=tx('sub');
    document.getElementById('loginBtn').textContent=tx('btn');
  } else {
    document.getElementById('aLangIt').classList.toggle('active',l==='it');
    document.getElementById('aLangEn').classList.toggle('active',l==='en');
    document.getElementById('exitBtn').textContent=tx('exit');
    document.getElementById('lblToday').textContent=tx('today');
    document.getElementById('lblUpcoming').textContent=tx('upcoming');
    document.getElementById('lblHistory').textContent=tx('history');
    document.getElementById('ufAll').textContent=tx('all');
    document.getElementById('hfAll').textContent=tx('allH');
    renderHeader();
    if(currentTab==='today')    renderToday();
    if(currentTab==='upcoming') renderUpcoming();
    if(currentTab==='history')  renderHistory();
  }
}

function renderHeader(){
  var now=new Date(); var h=now.getHours();
  document.getElementById('greeting').textContent=(h<12?tx('gm'):h<17?tx('ga'):tx('ge'))+', '+CLEANER+'!';
  document.getElementById('hDate').textContent=now.toLocaleDateString(lang==='it'?'it-IT':'en-GB',{weekday:'long',day:'numeric',month:'long'});
}

// ── DATE FILTER INIT ──────────────────────────────────────────
function initDateFilters(){
  var today=dStr(new Date());
  var f=document.getElementById('upcomingFrom');
  var t=document.getElementById('upcomingTo');
  f.value=today;
  t.value=addDays(today,30);
  f.addEventListener('change', renderUpcoming);
  t.addEventListener('change', renderUpcoming);
}

// ── LOGIN ─────────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', async function(){
  var pass=document.getElementById('loginPass').value;
  if(!pass) return;
  var btn=this, errEl=document.getElementById('loginError');
  btn.disabled=true; errEl.style.display='none';
  try{
    var res=await fetch(SB_URL+'/rest/v1/settings?key=eq.clean_password&select=value&apikey='+SB_KEY);
    var rows=await res.json();
    var stored=rows&&rows[0]&&rows[0].value?rows[0].value.hash:null;
    if(!stored){ errEl.textContent='Password not configured'; errEl.style.display='block'; }
    else{
      var enc=new TextEncoder();
      var buf=await crypto.subtle.digest('SHA-256',enc.encode(pass));
      var hex=Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
      if(hex===stored){
        document.getElementById('loginPass').value='';
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('app').style.display='block';
        renderHeader();
        initDateFilters();
        loadData(function(){ renderToday(); });
      } else {
        errEl.style.display='block'; errEl.textContent=tx('err');
        document.getElementById('loginPass').value='';
      }
    }
  } catch(e){ errEl.textContent='Connection error'; errEl.style.display='block'; }
  btn.disabled=false;
});

document.getElementById('loginPass').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
document.getElementById('exitBtn').addEventListener('click',function(){ document.getElementById('loginScreen').style.display='flex'; document.getElementById('app').style.display='none'; });
document.getElementById('lLangIt').addEventListener('click',function(){ setLang('it',true); });
document.getElementById('lLangEn').addEventListener('click',function(){ setLang('en',true); });
document.getElementById('aLangIt').addEventListener('click',function(){ setLang('it',false); });
document.getElementById('aLangEn').addEventListener('click',function(){ setLang('en',false); });
</script>
