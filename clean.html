<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleaner - Mare Mediterraneo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C8963E;--pietra:#C8B99A;--notte:#0A0A12;--notte2:#0F0F1A;--sabbia:#F5EFE6;--text:#E8DDD0;--muted:rgba(232,221,208,0.5);--border:rgba(200,185,154,0.15);--green:#27ae60;--red:#e74c3c}
body{background:var(--notte);color:var(--text);font-family:'Tenor Sans',sans-serif;min-height:100vh}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:100%;max-width:340px;background:var(--notte2);border:1px solid var(--border);border-radius:8px;padding:32px 24px;text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;color:var(--pietra);margin-bottom:4px}
.login-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.lang-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.lang-pill{padding:5px 14px;border-radius:20px;border:1px solid var(--border);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;font-family:'Tenor Sans',sans-serif}
.lang-pill.active{background:var(--gold);color:var(--notte);border-color:var(--gold)}
.login-input{width:100%;background:rgba(200,185,154,0.06);border:1px solid var(--border);border-radius:3px;padding:14px;font-family:'Tenor Sans',sans-serif;font-size:18px;color:var(--text);margin-bottom:12px;outline:none;text-align:center;letter-spacing:4px}
.login-btn{width:100%;padding:14px;background:var(--gold);color:var(--notte);border:none;border-radius:3px;font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-weight:600}
.login-error{color:var(--red);font-size:11px;margin-top:8px;display:none}
#app{display:none}
.header{background:var(--notte2);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.greeting{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--sabbia)}
.header-date{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.header-right{display:flex;gap:10px;align-items:center}
.lang-sm{padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;font-family:'Tenor Sans',sans-serif}
.lang-sm.active{background:var(--gold);color:var(--notte);border-color:var(--gold)}
.exit-btn{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border);padding:6px 12px;border-radius:2px;cursor:pointer}
.content{padding:20px;max-width:600px;margin:0 auto}
.refresh-btn{width:100%;padding:12px;background:rgba(200,185,154,0.06);border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'Tenor Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:20px}
.sec-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:0.5px;background:rgba(200,185,154,0.15)}
.suite-card{border-radius:6px;overflow:hidden;margin-bottom:12px}
.s-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.s-head.clean{background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.25)}
.s-head.dirty{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.25)}
.s-head.occupied{background:rgba(200,150,62,0.12);border:1px solid rgba(200,150,62,0.25)}
.s-label{font-size:10px;letter-spacing:3px;text-transform:uppercase}
.s-label.clean{color:var(--green)}
.s-label.dirty{color:var(--red)}
.s-label.occupied{color:var(--gold)}
.s-badge{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:2px}
.b-clean{background:rgba(39,174,96,0.2);color:var(--green)}
.b-dirty{background:rgba(231,76,60,0.2);color:var(--red)}
.b-occupied{background:rgba(200,150,62,0.2);color:var(--gold)}
.s-body{background:var(--notte2);border:1px solid var(--border);border-top:none;padding:14px 16px}
.s-main{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--sabbia);margin-bottom:4px}
.s-sub{font-size:10px;color:var(--muted)}
.cl-title{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:14px 0 10px}
.cl-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid rgba(200,185,154,0.06);cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-box{width:22px;height:22px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.cl-item.done .cl-box{background:var(--green);border-color:var(--green);color:white}
.cl-item.done .cl-txt{text-decoration:line-through;opacity:0.5}
.cl-txt{font-size:13px;color:var(--text)}
.wk-item{background:var(--notte2);border:1px solid var(--border);border-radius:4px;padding:14px 16px;margin-bottom:8px;display:flex;gap:16px}
.wk-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);line-height:1;min-width:32px;text-align:center}
.wk-day{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.wk-suite{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.wk-action{font-size:15px;color:var(--sabbia);font-family:'Cormorant Garamond',serif}
.wk-time{font-size:10px;color:var(--muted);margin-top:2px}
.wk-tag{display:inline-block;font-size:7px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;margin-top:4px}
.t-out{background:rgba(231,76,60,0.15);color:var(--red)}
.t-in{background:rgba(39,174,96,0.15);color:var(--green)}
.t-cl{background:rgba(200,150,62,0.15);color:var(--gold)}
.empty{text-align:center;padding:32px;color:var(--muted);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px}
.loading{text-align:center;padding:20px;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Mare Mediterraneo</div>
    <div class="login-sub" id="lSub">Portale Pulizie</div>
    <div class="lang-row">
      <button class="lang-pill active" id="lLangIt">IT</button>
      <button class="lang-pill" id="lLangEn">EN</button>
    </div>
    <input type="password" class="login-input" id="loginPass" placeholder="••••••••">
    <button class="login-btn" id="loginBtn">Entra</button>
    <div class="login-error" id="loginError">Password errata</div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div>
      <div class="greeting" id="greeting"></div>
      <div class="header-date" id="hDate"></div>
    </div>
    <div class="header-right">
      <button class="lang-sm active" id="aLangIt">IT</button>
      <button class="lang-sm" id="aLangEn">EN</button>
      <button class="exit-btn" id="exitBtn">Esci</button>
    </div>
  </div>
  <div class="content">
    <button class="refresh-btn" id="refreshBtn">Aggiorna</button>
    <div id="suiteStatuses"></div>
    <div class="sec-title" id="weekTitle">Questa Settimana</div>
    <div id="weekSchedule"></div>
  </div>
</div>

<script>
var PASS = 'Mare2026';
var CLEANER = 'Daniela';
var SB_URL = 'https://wbosfegdgizkygxjxjiz.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indib3NmZWdkZ2l6a3lneGp4aml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTQ5NjksImV4cCI6MjA5NDA3MDk2OX0.aQxHyA8NJmY0LAbRNo6EibF5zN5shQey-JNyI0t-GCg';
var lang = 'it';
var bookings = [];
var blockedDates = [];

var TXT = {
  it: {
    sub:'Portale Pulizie', btn:'Entra', err:'Password errata',
    refresh:'Aggiorna', week:'Questa Settimana', exit:'Esci',
    gm:'Buongiorno', ga:'Buon pomeriggio', ge:'Buonasera',
    occupied:'Occupata', clean:'Pulita', dirty:'Da Pulire',
    noAction:'Nessuna azione necessaria',
    checkTomorrow:'Check-out DOMANI alle 10:00 - Prepararsi a pulire',
    cleanToday:'PULIRE OGGI dopo le 10:00',
    nextGuest:'Prossimo ospite', noNext:'Nessun prossimo ospite',
    noWeek:'Nessun evento questa settimana - Buon riposo!',
    tout:'Check-out', tin:'Check-in', tcl:'Pulire',
    today:'OGGI', tomorrow:'DOMANI',
    clTitle:'Lista Pulizie',
    cl:['Cambiare lenzuola e federe','Pulire e igienizzare il bagno','Lavare i pavimenti','Pulire cucina - piano cottura, lavello, superfici','Lavare i piatti rimasti','Svuotare tutti i cestini','Pulire i mobili del giardino/terrazza','Controllare la doccia esterna','Ricaricare i prodotti da bagno','Controllare i telecomandi del clima','Controllare che il WiFi funzioni','Controllo finale - chiudere tutte le finestre']
  },
  en: {
    sub:'Cleaner Portal', btn:'Enter', err:'Incorrect password',
    refresh:'Refresh', week:'This Week', exit:'Exit',
    gm:'Good morning', ga:'Good afternoon', ge:'Good evening',
    occupied:'Occupied', clean:'Clean', dirty:'Clean Now',
    noAction:'Available - No action needed',
    checkTomorrow:'Check-out TOMORROW at 10:00 - Prepare to clean',
    cleanToday:'CLEAN TODAY after 10:00',
    nextGuest:'Next guest', noNext:'No next guest yet',
    noWeek:'No events this week - Enjoy the rest!',
    tout:'Check-out', tin:'Check-in', tcl:'Clean',
    today:'TODAY', tomorrow:'TOMORROW',
    clTitle:'Cleaning Checklist',
    cl:['Change all bed linen and pillowcases','Clean and sanitise bathroom','Mop all floors','Clean kitchen - hob, sink, surfaces','Wash up any dishes','Empty all bins','Wipe down garden/terrace furniture','Check outdoor shower area','Restock toiletries and soap','Check AC remotes are present','Check WiFi router is on','Final walkthrough - all windows closed']
  }
};

function tx(k) { return (TXT[lang] && TXT[lang][k]) ? TXT[lang][k] : (TXT['en'][k] || k); }

function dStr(d) { return d.toISOString().split('T')[0]; }
function addDays(s, n) { var d = new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return dStr(d); }
function fmtDate(s) { return new Date(s+'T00:00:00').toLocaleDateString(lang==='it'?'it-IT':'en-GB',{weekday:'short',day:'numeric',month:'short'}); }

function setLang(l, isLogin) {
  lang = l;
  if (isLogin) {
    document.getElementById('lLangIt').classList.toggle('active', l==='it');
    document.getElementById('lLangEn').classList.toggle('active', l==='en');
    document.getElementById('lSub').textContent = tx('sub');
    document.getElementById('loginBtn').textContent = tx('btn');
    document.getElementById('loginError').textContent = tx('err');
  } else {
    document.getElementById('aLangIt').classList.toggle('active', l==='it');
    document.getElementById('aLangEn').classList.toggle('active', l==='en');
    document.getElementById('exitBtn').textContent = tx('exit');
    document.getElementById('refreshBtn').textContent = tx('refresh');
    document.getElementById('weekTitle').textContent = tx('week');
    renderAll();
  }
}

function sbFetch(table, order) {
  var hdrs = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  return fetch(SB_URL+'/rest/v1/'+table+'?apikey='+SB_KEY+'&order='+order+'.asc', {headers:hdrs})
    .then(function(r) { return r.json(); })
    .then(function(d) { return Array.isArray(d) ? d : []; })
    .catch(function() { return []; });
}

function loadData(callback) {
  sbFetch('bookings', 'checkin')
    .then(function(rows) {
      bookings = rows;
      return sbFetch('blocked_dates', 'from_date');
    })
    .then(function(rows) {
      blockedDates = rows;
      if (callback) callback();
    });
}

function getSuiteStatus(suite) {
  var today = dStr(new Date());
  var tomorrow = addDays(today, 1);
  var sb = bookings.filter(function(b) { return b.suite === suite; });
  var i, b, nextIn, j;
  for (i = 0; i < sb.length; i++) {
    b = sb[i];
    if (b.checkout === today) {
      nextIn = null;
      for (j = 0; j < sb.length; j++) {
        if (sb[j].checkin >= today && sb[j].id !== b.id) {
          if (!nextIn || sb[j].checkin < nextIn.checkin) nextIn = sb[j];
        }
      }
      return {st:'dirty', main:tx('cleanToday'), sub: nextIn ? tx('nextGuest')+': '+fmtDate(nextIn.checkin)+' 15:00' : tx('noNext'), cl:true};
    }
    if (b.checkout === tomorrow && b.checkin <= today) {
      return {st:'occupied', main:b.guest||tx('occupied'), sub:tx('checkTomorrow')};
    }
    if (b.checkin <= today && b.checkout > today) {
      return {st:'occupied', main:b.guest||tx('occupied'), sub:'Check-out: '+fmtDate(b.checkout)+' 10:00'};
    }
  }
  return {st:'clean', main:tx('noAction'), sub:''};
}

function buildChecklist(suite) {
  var items = tx('cl');
  var key = 'cl_'+suite+'_'+dStr(new Date());
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem(key)||'{}'); } catch(e) {}
  var h = '<div class="cl-title">'+tx('clTitle')+'</div>';
  for (var i = 0; i < items.length; i++) {
    h += '<div class="cl-item'+(saved[i]?' done':'')+'" data-suite="'+suite+'" data-i="'+i+'">';
    h += '<div class="cl-box">'+(saved[i]?'v':'')+'</div>';
    h += '<span class="cl-txt">'+items[i]+'</span></div>';
  }
  return h;
}

function renderSuites() {
  var suites = [{k:'pietra',n:'Suite Pietra'},{k:'cielo',n:'Suite Cielo'}];
  var h = '<div class="sec-title">'+(lang==='it'?'Stato Appartamenti':'Suite Status')+'</div>';
  for (var i = 0; i < suites.length; i++) {
    var s = suites[i];
    var st = getSuiteStatus(s.k);
    var badge = st.st==='clean' ? tx('clean') : st.st==='dirty' ? tx('dirty') : tx('occupied');
    h += '<div class="suite-card">';
    h += '<div class="s-head '+st.st+'"><span class="s-label '+st.st+'">'+s.n+'</span>';
    h += '<span class="s-badge b-'+st.st+'">'+badge+'</span></div>';
    h += '<div class="s-body"><div class="s-main">'+st.main+'</div>';
    if (st.sub) h += '<div class="s-sub">'+st.sub+'</div>';
    if (st.cl) h += buildChecklist(s.k);
    h += '</div></div>';
  }
  document.getElementById('suiteStatuses').innerHTML = h;

  // Attach checklist click handlers
  var items = document.querySelectorAll('.cl-item');
  for (var j = 0; j < items.length; j++) {
    items[j].addEventListener('click', function() {
      var suite = this.getAttribute('data-suite');
      var idx = parseInt(this.getAttribute('data-i'));
      var key = 'cl_'+suite+'_'+dStr(new Date());
      var saved = {};
      try { saved = JSON.parse(localStorage.getItem(key)||'{}'); } catch(e) {}
      saved[idx] = !saved[idx];
      localStorage.setItem(key, JSON.stringify(saved));
      this.classList.toggle('done', saved[idx]);
      this.querySelector('.cl-box').textContent = saved[idx] ? 'v' : '';
    });
  }
}

function renderWeek() {
  var today = dStr(new Date());
  var weekEnd = addDays(today, 7);
  var events = [];
  var NAMES = {pietra:'Suite Pietra', cielo:'Suite Cielo', villa:'Villa Completa'};
  var i, b;

  for (i = 0; i < bookings.length; i++) {
    b = bookings[i];
    if (b.linked_to_villa) continue;
    var sn = NAMES[b.suite] || b.suite;
    if (b.checkout >= today && b.checkout <= weekEnd) {
      events.push({date:b.checkout, type:'out', suite:sn, guest:b.guest||''});
      events.push({date:b.checkout, type:'cl', suite:sn, guest:b.guest||''});
    }
    if (b.checkin >= today && b.checkin <= weekEnd) {
      events.push({date:b.checkin, type:'in', suite:sn, guest:b.guest||''});
    }
  }

  events.sort(function(a,b) { return a.date > b.date ? 1 : -1; });

  if (events.length === 0) {
    document.getElementById('weekSchedule').innerHTML = '<div class="empty">'+tx('noWeek')+'</div>';
    return;
  }

  var h = '';
  for (i = 0; i < events.length; i++) {
    var e = events[i];
    var d = new Date(e.date+'T00:00:00');
    var num = d.getDate();
    var dayName = e.date===today ? tx('today') : e.date===addDays(today,1) ? tx('tomorrow') : d.toLocaleDateString(lang==='it'?'it-IT':'en-GB',{weekday:'short'});
    var tagCls = e.type==='out' ? 't-out' : e.type==='in' ? 't-in' : 't-cl';
    var tagLbl = e.type==='out' ? tx('tout') : e.type==='in' ? tx('tin') : tx('tcl');
    var action, time;
    if (e.type==='out') {
      action = lang==='it' ? e.guest+' lascia alle 10:00' : e.guest+' checks out at 10:00';
      time = '10:00';
    } else if (e.type==='in') {
      action = lang==='it' ? e.guest+' arriva alle 15:00' : e.guest+' arrives at 15:00';
      time = lang==='it' ? 'Pronto entro le 15:00' : 'Ready by 15:00';
    } else {
      action = lang==='it' ? 'Pulire '+e.suite+' dopo la partenza' : 'Clean '+e.suite+' after departure';
      time = lang==='it' ? 'Dopo le 10:00' : 'After 10:00';
    }
    h += '<div class="wk-item"><div><div class="wk-num">'+num+'</div><div class="wk-day">'+dayName+'</div></div>';
    h += '<div><div class="wk-suite">'+e.suite+'</div><div class="wk-action">'+action+'</div>';
    h += '<div class="wk-time">'+time+'</div><span class="wk-tag '+tagCls+'">'+tagLbl+'</span></div></div>';
  }
  document.getElementById('weekSchedule').innerHTML = h;
}

function renderHeader() {
  var now = new Date();
  var h = now.getHours();
  var gr = h<12 ? tx('gm') : h<17 ? tx('ga') : tx('ge');
  document.getElementById('greeting').textContent = gr+', '+CLEANER+'!';
  document.getElementById('hDate').textContent = now.toLocaleDateString(lang==='it'?'it-IT':'en-GB',{weekday:'long',day:'numeric',month:'long'});
}

function renderAll() {
  renderHeader();
  renderSuites();
  renderWeek();
}

// LOGIN
document.getElementById('loginBtn').addEventListener('click', function() {
  var pass = document.getElementById('loginPass').value;
  if (pass === PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderHeader();
    document.getElementById('suiteStatuses').innerHTML = '<div class="loading">'+(lang==='it'?'Caricamento...':'Loading...')+'</div>';
    loadData(function() { renderAll(); });
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = tx('err');
    document.getElementById('loginPass').value = '';
  }
});

document.getElementById('loginPass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('exitBtn').addEventListener('click', function() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPass').value = '';
});

document.getElementById('refreshBtn').addEventListener('click', function() {
  document.getElementById('suiteStatuses').innerHTML = '<div class="loading">'+(lang==='it'?'Aggiornamento...':'Refreshing...')+'</div>';
  loadData(function() { renderAll(); });
});

document.getElementById('lLangIt').addEventListener('click', function() { setLang('it', true); });
document.getElementById('lLangEn').addEventListener('click', function() { setLang('en', true); });
document.getElementById('aLangIt').addEventListener('click', function() { setLang('it', false); });
document.getElementById('aLangEn').addEventListener('click', function() { setLang('en', false); });
</script>
</body>
</html>
