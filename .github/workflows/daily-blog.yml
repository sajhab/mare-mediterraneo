name: Daily Blog Generator

on:
  schedule:
    - cron: "0 7 * * 1-6"
  workflow_dispatch:
    inputs:
      force_topic:
        description: "Override topic ID (optional)"
        required: false
        default: ""

jobs:
  generate-blog:
    name: Generate Daily Blog Articles
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure blog directory exists
        run: mkdir -p blog

      - name: Run blog generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python blog-generator.py

      - name: Verify output
        run: |
          echo "=== Blog files ==="
          ls -la blog/
          if [ -f blog/articles.json ]; then
            python3 -c "
          import json
          with open('blog/articles.json') as f:
              data = json.load(f)
          print('Total articles: ' + str(len(data)))
          if data:
              print('Most recent: ' + data[0].get('title','N/A'))
          "
          fi

      - name: Commit and push
        run: |
          git config --local user.email "blog-bot@maremediterraneo.com"
          git config --local user.name "Mare Mediterraneo Blog Bot"
          git add blog/ sitemap.xml .used_topics.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "blog: auto-publish ${TODAY} — IT/DE/FR/EN"
            git push origin HEAD:main
            echo "Pushed successfully"
          fi

      - name: Done
        if: success()
        run: echo "Blog generation complete — https://maremediterraneo.com/blog/"

      - name: Failed
        if: failure()
        run: echo "Blog generation FAILED — check logs above"
