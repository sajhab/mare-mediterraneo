name: Daily Blog Generator

on:
  # Run Mon–Sat at 7:00 AM UTC
  schedule:
    - cron: "0 7 * * 1-6"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_topic:
        description: "Override topic ID (optional — leave blank for auto)"
        required: false
        default: ""

jobs:
  generate-blog:
    name: Generate Daily Blog Articles
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ── 1. Checkout repo ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Setup Python ───────────────────────────────────
      - name: Setup Python 2.7
        uses: actions/setup-python@v5
        with:
          python-version: "2.7"

      # ── 3. Ensure blog directory exists ───────────────────
      - name: Ensure blog directory exists
        run: |
          mkdir -p blog

      # ── 4. Run blog generator ─────────────────────────────
      - name: Generate blog articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_TOPIC_ID: ${{ github.event.inputs.force_topic }}
        run: |
          python blog-generator.py

      # ── 5. Verify output ──────────────────────────────────
      - name: Verify output files
        run: |
          echo "=== Blog directory contents ==="
          ls -la blog/ || echo "Blog directory is empty"
          echo ""
          echo "=== articles.json ==="
          if [ -f blog/articles.json ]; then
            python -c "
          import json
          f = open('blog/articles.json', 'r')
          data = json.load(f)
          f.close()
          print('Total articles indexed: ' + str(len(data)))
          if data:
              print('Most recent: ' + data[0].get('title', 'N/A'))
          "
          else
            echo "articles.json not found"
          fi

      # ── 6. Commit and push ────────────────────────────────
      - name: Commit and push new articles
        run: |
          git config --local user.email "blog-bot@maremediterraneo.com"
          git config --local user.name "Mare Mediterraneo Blog Bot"

          git add blog/ sitemap.xml .used_topics.json

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "blog: auto-publish articles for ${TODAY}

          Generated by blog-generator.py via GitHub Actions
          Languages: IT / DE / FR / EN"

            git push origin HEAD:main
            echo "Articles pushed successfully"
          fi

      # ── 7. Log result ─────────────────────────────────────
      - name: Log success
        if: success()
        run: |
          echo "======================================"
          echo " Blog generation completed successfully"
          echo " Site: https://maremediterraneo.com/blog/"
          echo "======================================"

      - name: Log failure
        if: failure()
        run: |
          echo "======================================"
          echo " Blog generation FAILED"
          echo " Check logs above for details"
          echo "======================================"
